name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Docs & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run docs harness
        run: npm run docs:check

      - name: Run tests
        run: npm test

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t discord-music-bot:ci .
